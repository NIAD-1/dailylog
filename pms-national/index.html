<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAFDAC PMS National Intelligence Portal</title>
  <meta name="description" content="National Agency for Food and Drug Administration and Control — Post Marketing Surveillance National Intelligence Platform">

  <!-- Design System -->
  <link rel="stylesheet" href="styles.css">

  <!-- Vendor: Choices.js (Multi-select dropdowns) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

  <!-- Vendor: Chart.js (Analytics) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ═══ Pre-Authenticated Login Gate ═══ -->
  <div id="loginScreen">
    <canvas id="particleCanvas" style="position:absolute;inset:0;z-index:0;opacity:0.8;pointer-events:none;"></canvas>
    <div class="login-card animate-fade-in">
      <img src="logo.png" alt="NAFDAC Logo">
      <h1>PMS National</h1>
      <p class="subtitle">Regulatory Intelligence Portal</p>
      <button id="btnSignIn" class="btn-google">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </button>
      <p class="small muted" style="margin-top: 24px; text-transform: uppercase; letter-spacing: 0.1em;">Secured by Internal Administration</p>
    </div>
  </div>

  <!-- ═══ Authenticated Portal Shell ═══ -->
  <div id="authenticatedApp" class="hidden" style="display:none;">
    <header>
      <div class="logo-container">
        <img src="logo.png" alt="NAFDAC Logo" class="logo-img">
        <div>
          <div class="logo-text">NAFDAC PMS</div>
          <div class="logo-sub">National Intelligence Portal</div>
        </div>
      </div>
      <div class="flex">
        <div id="navLinks" class="flex" style="gap: 4px;">
          <button class="nav-btn active" data-target="welcome">Home</button>
          <button class="nav-btn" data-target="dashboard">Dashboard</button>
        </div>
        <div style="border-left: 1px solid rgba(255,255,255,0.3); height: 28px; margin: 0 8px;"></div>
        <div id="userInfo" style="text-align: right;">
          <div id="userName" style="font-size: 14px; font-weight: 700;">Director</div>
          <div id="userRole" style="font-size: 11px; opacity: 0.8;">National Admin</div>
        </div>
        <button id="btnSignOut" class="secondary" style="padding: 8px 16px; font-size: 12px;">Sign out</button>
      </div>
    </header>

    <main id="app"></main>
  </div>

  <div id="modalContainer"></div>

  <!-- Independent Visual Engine -->
  <script src="particles.js"></script>
  <!-- Application Module -->
  <script type="module" src="app.js"></script>
</body>
</html>
